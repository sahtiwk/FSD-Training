<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Product Card</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .product-card {
            background-color: white;
            border-radius: 15px;
            overflow: hidden;
            max-width: 800px;
            width: 100%;
            display: flex;
            flex-direction: row;
        }

        .image-container {
            width: 50%;
            overflow: hidden;
            position: relative;
        }

        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
            display: block;
        }

        .image-container:hover .product-image {
            transform: scale(1.1);
        }

        .details-container {
            width: 50%;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-sizing: border-box;
        }

        .product-name {
            font-size: 24px;
            font-weight: bold;
            margin: 0 0 10px 0;
            color: #333;
        }

        .product-price {
            font-size: 20px;
            color: #e44d26;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .buy-button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        .buy-button:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }

        .buy-button:active {
            transform: translateY(0);
        }

        @media screen and (max-width: 768px) {
            .product-card {
                flex-direction: column;
                max-width: 400px;
            }

            .image-container {
                width: 100%;
                height: 250px;
            }

            .details-container {
                width: 100%;
                padding: 20px;
            }
        }
    </style>
</head>

<body>

    <div class="product-card">
        <div class="image-container">
            <img class="product-image" src="product.png" alt="Wireless Headphones">
        </div>
        <div class="details-container">
            <h2 class="product-name">Premium Wireless Headphones</h2>
            <div class="product-price">$199.99</div>
            <button class="buy-button">Buy Now</button>
        </div>
    </div>

</body>

</html>
