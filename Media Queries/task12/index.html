<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .heh {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            display: flex;
            background-color: black;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 10px;
            border-radius: 10px;
            width: fit-content;
            gap: 5px;
            /* margin: 10px auto; */
        }

        .red {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: red;
            opacity: 0.2;
            animation-name: redd;
            animation-timing-function: linear;
            animation-duration: 6s;
            animation-iteration-count: infinite;
        }

        .yellow {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: yellow;
            opacity: 0.2;
            animation-name: yelloww;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
            animation-duration: 6s;
            animation-delay: 2s;
        }

        .green {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: rgb(125, 206, 44);
            opacity: 0.2;
            animation-name: greenn;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
            animation-duration: 6s;
            animation-delay: 4s;
        }

        @keyframes redd {

            0%,
            33.33% {
                opacity: 1;
            }

            33.34%,
            100% {
                opacity: 0.2;
            }
        }

        @keyframes yelloww {

            0%,
            33.33% {
                opacity: 1;
            }

            33.34%,
            100% {
                opacity: 0.2;
            }
        }

        @keyframes greenn {

            0%,
            33.33% {
                opacity: 1;
            }

            33.34%,
            100% {
                opacity: 0.2;
            }
        }

        .pole {
            width: 40px;
            height: 390px;
            background-color: black;
        }

        .base {
            width: 200px;
            height: 40px;
            background-color: black;
            border-radius: 10%;
        }
    </style>

</head>

<body>
    <div class="heh">
        <div class="container">
            <div class="red"></div>
            <div class="yellow"></div>
            <div class="green"></div>
        </div>
        <div class="pole">
        </div>
        <div class="base">

        </div>
    </div>
</body>

</html>
