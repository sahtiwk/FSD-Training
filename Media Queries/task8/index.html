<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        img {
            width: 500px;
            height: 700px;
            border-radius: 20px;
            margin-top: 100px;
        }

        img:hover {
            transition: all 1s;
            transform: scale(1.2);
        }
    </style>
</head>

<body>
    <div class="container">
        <img src="img.jpg" alt="">
    </div>
</body>

</html>
