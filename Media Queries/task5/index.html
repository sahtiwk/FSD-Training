<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100px;
        }

        .butt {
            width: 100px;
            border-radius: 10px;
            font-size: medium;
            background-color: aqua;
            padding: 10px;
            transition: all 0.5s;
            cursor: pointer;
        }

        .butt:hover {
            background-color: chartreuse;
            transform: scale(1.1);
        }
    </style>
</head>

<body>
    <div class="container">
        <button class="butt">
            hehe
        </button>
    </div>
</body>

</html>
