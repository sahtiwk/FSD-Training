<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .navbar {
            display: flex;
            justify-content: space-evenly;
            background-color: black;
            padding: 15px;
        }

        .navbar a {
            text-decoration: none;
            color: white;
            font-size: small;
            transition: all 1s ease-in-out;
        }

        .navbar a:hover {
            background-color: grey;
            text-decoration: underline;
            font-size: medium;
        }
    </style>
</head>

<body>
    <header class="navbar">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
        <a href="#">Login</a>
    </header>
</body>

</html>
