<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>Virtual Keyboard</title>
	<style>
		:root{--key-w:52px;--key-h:54px;--bg1:#e9eef7;--bg2:#f7f9fc;--panel:#ffffffcc;--border:#d9e2ef;--shadow:0 18px 50px rgba(19,39,67,.14)}
		*{box-sizing:border-box}
		body{font-family:Inter,system-ui,Segoe UI,Roboto,Arial,sans-serif;margin:0;min-height:100vh;background:radial-gradient(circle at top,#ffffff 0%,var(--bg2) 34%,var(--bg1) 100%);color:#0f172a;padding:28px}
		.container{max-width:1040px;margin:0 auto}
		.display{width:100%;min-height:150px;margin:0 auto 18px;background:var(--panel);backdrop-filter:blur(12px);border-radius:22px;border:1px solid rgba(255,255,255,.8);box-shadow:var(--shadow);padding:22px 24px;font-size:28px;line-height:1.45;display:flex;align-items:flex-start;white-space:pre-wrap;overflow:auto;color:#111827}
		.hint{max-width:1000px;margin:0 auto 24px;color:#5b6472;font-size:14px;text-align:center;letter-spacing:.01em}
		.keyboard{width:100%;max-width:1000px;margin:0 auto;display:grid;gap:12px;padding:22px;background:rgba(255,255,255,.48);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.75);border-radius:28px;box-shadow:var(--shadow)}
		.row{display:flex;gap:10px;justify-content:center;flex-wrap:nowrap}
		.key{background:linear-gradient(180deg,#f8fafc 0%,#dfe7f1 100%);color:#0f172a;height:var(--key-h);min-width:var(--key-w);display:inline-flex;align-items:center;justify-content:center;border-radius:14px;border:1px solid var(--border);box-shadow:0 4px 0 #c8d3e0,0 10px 22px rgba(15,23,42,.08);user-select:none;font-weight:600;font-size:14px;letter-spacing:.02em;padding:0 14px;transition:transform .08s ease,box-shadow .08s ease,background .2s ease,color .2s ease}
		.key.wide{min-width:calc(var(--key-w)*2 + 10px)}
		.key.wider{min-width:calc(var(--key-w)*4 + 30px)}
		.key:hover{transform:translateY(-1px)}
		.key.pressed{background:linear-gradient(180deg,#1f2937 0%,#0f172a 100%);color:#fff;transform:translateY(3px);box-shadow:0 1px 0 #0b1220,0 8px 18px rgba(15,23,42,.22)}
		#row5 .key{min-width:calc(var(--key-w)*1.1)}
		@media (max-width: 860px){
			body{padding:18px}
			.keyboard{padding:16px;gap:10px}
			.row{gap:8px;overflow-x:auto;justify-content:flex-start;padding-bottom:2px}
			.display{font-size:22px;padding:18px}
		}
	</style>
</head>
<body>
	<div class="container">
		<div class="display" id="display" aria-live="polite"></div>
		<div class="hint">Type on your physical keyboard. Keys will darken while pressed; typed characters appear above.</div>
		<div class="keyboard" id="keyboard">
			<div class="row" id="row1"></div>
			<div class="row" id="row2"></div>
			<div class="row" id="row3"></div>
			<div class="row" id="row4"></div>
			<div class="row" id="row5"></div>
		</div>
	</div>

	<script>
		const layout = [
			['`','1','2','3','4','5','6','7','8','9','0','-','=', 'Backspace'],
			['Tab','q','w','e','r','t','y','u','i','o','p','[',']','\\'],
			['Caps','a','s','d','f','g','h','j','k','l',';','\'', 'Enter'],
			['Shift','z','x','c','v','b','n','m',',','.','/','Shift'],
			['Control','Meta','Alt','Space','Alt','Meta','Menu','Control']
		];

		const keyMap = {};
		const keyboard = document.getElementById('keyboard');
		function makeKey(label){
			const el = document.createElement('div');
			el.className = 'key';
			el.textContent = label;
			el.dataset.key = label.toLowerCase();
			return el;
		}

		// render
		['row1','row2','row3','row4','row5'].forEach((id, i)=>{
			const row = document.getElementById(id);
			layout[i].forEach(key=>{
				const el = makeKey(key === 'Space' ? '␣' : key);
				if(['Tab','Caps','Shift','Backspace','Enter','Space','Control','Alt','Meta','Menu'].includes(key)) el.classList.add('wide');
				if(key === 'Space') el.classList.add('wider');
				row.appendChild(el);
				keyMap[key.toLowerCase()] = el;
			});
		});

		const display = document.getElementById('display');
		let buffer = '';

		function showChar(ch){
			if(ch === 'backspace'){
				buffer = buffer.slice(0,-1);
			} else if(ch === 'enter'){
				buffer += '\n';
			} else if(ch === 'space'){
				buffer += ' ';
			} else if(ch.length === 1){
				buffer += ch;
			}
			display.textContent = buffer;
		}

		function keyNameFromEvent(e){
			if(e.key === ' ') return 'space';
			return e.key.toLowerCase();
		}

		window.addEventListener('keydown', e=>{
			const name = keyNameFromEvent(e);
			const el = keyMap[name] || keyMap[e.code.toLowerCase()];
			if(el) el.classList.add('pressed');
			// prevent default for some control keys so they don't navigate (optional)
			if(['tab','backspace'].includes(name)) e.preventDefault();
			if(name === 'tab') showChar('\t');
			else showChar(name);
		});

		window.addEventListener('keyup', e=>{
			const name = keyNameFromEvent(e);
			const el = keyMap[name] || keyMap[e.code.toLowerCase()];
			if(el) el.classList.remove('pressed');
		});

		// allow clicking virtual keys to insert
		keyboard.addEventListener('click', ev=>{
			const k = ev.target.closest('.key');
			if(!k) return;
			const name = k.dataset.key;
			k.classList.add('pressed');
			setTimeout(()=>k.classList.remove('pressed'),120);
			if(name === '␣' || name === 'space') showChar(' ');
			else if(name === 'backspace') showChar('backspace');
			else if(name === 'enter') showChar('enter');
			else showChar(name.length===1?name:name);
		});
	</script>
</body>
</html>
